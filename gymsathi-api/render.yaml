services:
  - type: web
    name: gymsathi-api
    runtime: python
    region: singapore

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: DATABASE_URL
        sync: false

      - key: SECRET_KEY
        sync: false

      - key: ADMIN_WHATSAPP_NUMBER
        sync: false

      - key: ADMIN_WHATSAPP_API_KEY
        sync: false

      - key: ADMIN_WHATSAPP_APP_NAME
        sync: false

      - key: CORS_ORIGINS
        sync: false

      - key: DEBUG
        value: "false"